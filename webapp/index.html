<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDrop Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome ikonkalari uchun -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header: Profil ma'lumotlari -->
        <header>
            <div class="user-info" onclick="copyId()">
                <img id="user-photo" src="https://via.placeholder.com/40" alt="Avatar">
                <div class="user-text">
                    <span id="user-name">Yuklanmoqda...</span>
                    <span id="user-id">ID: 00000000</span>
                </div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>
            <div class="token-badge">
                <i class="fa-solid fa-coins"></i>
                <span id="token-balance">0</span>
            </div>
        </header>

        <main>
            <div class="card main-card">
                <h3>KUNLIK BONUS</h3>
                <div class="box-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/5637/5637217.png" alt="Box" class="floating-box">
                </div>
                <p id="status-text">Bugungi dropingizni ochishingiz mumkin</p>
                <button id="open-btn" onclick="claimDrop()">OCHISH</button>
                <p id="cooldown-timer" class="hidden"></p>
            </div>

            <div class="tasks-section">
                <h4>VAZIFALAR</h4>
                <div class="task-item">
                    <div class="task-info">
                        <span>Kanalga obuna bo'ling</span>
                        <small>+3 token | bir martalik</small>
                    </div>
                    <button class="check-btn" onclick="checkTask()">Tekshirish</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
